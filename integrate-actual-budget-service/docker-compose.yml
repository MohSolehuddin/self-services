version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: budget-postgres
    environment:
      POSTGRES_DB: budget_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - budget-network

  # Actual Budget
  actual_budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    environment:
      - PORT=5006
    ports:
      - "5006:5006"
    volumes:
      - actual_budget_data:/data
    networks:
      - budget-network

  # Budget Service (API Gateway)
  budget_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=budget_service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - ACTUAL_BASE_URL=http://actual_budget:5006
      - ACTUAL_DEFAULT_PASSWORD=secret
      - JWT_SECRET=super-secret-jwt-key-7133351898
      - JWT_EXPIRES_IN=7d
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - actual_budget
    networks:
      - budget-network

networks:
  budget-network:
    driver: bridge

volumes:
  postgres_data:
  actual_budget_data:
